# This workflow will auto-pick reviewers to assign to a PR when a "pr-review" label is applied
# Read the docs: https://newjersey.github.io/innovation-engineering/guides/github-actions/action-pickaroo/
name: Pickaroo Reviewers

on:
  pull_request:
    types: ["labeled"]

jobs:
  request-project-reviewers:
    if: ${{ github.event.label.name == 'pr-review' }}
    uses: newjersey/innovation-shared-actions/.github/workflows/pickaroo.yml@main
    secrets: inherit # used because the above workflow accesses org secrets
    permissions: {} # not using the default GITHUB_TOKEN
    with:
      include_users: "curt-mitch-gov alekvuka"
      extras: false # don't add extras for project reviewers
      number_of_reviewers: 1 # should always pick the other member of the team
      channel_id: "C0590CD1EE8" # resx-eng
      slack_as_author: false # default, set to true to notify as the PR author in slack

  request-initiative-reviewers:
    if: ${{ github.event.label.name == 'pr-review' }}
    needs: request-project-reviewers # avoid race with initial pr-review job
    uses: newjersey/innovation-shared-actions/.github/workflows/pickaroo.yml@main
    secrets: inherit
    permissions: {}
    with:
      include_teams: "innovation-engineering-resx"
      exclude_users: "curt-mitch-gov alekvuka" # exclude project reviewers
      number_of_reviewers: 1
      channel_id: "C0590CD1EE8" # resx-eng

  pr-show:
    if: ${{ github.event.label.name == 'pr-show' }}
    uses: newjersey/innovation-shared-actions/.github/workflows/pickaroo.yml@main
    secrets: inherit
    permissions: {}
    with:
      show: true
      channel_id: "C0590CD1EE8" # resx-eng
      slack_as_author: false
